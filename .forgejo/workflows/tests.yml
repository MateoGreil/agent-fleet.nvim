name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
      - uses: https://github.com/rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable
      - run: nvim --version
      - run: bash tests/run.sh
